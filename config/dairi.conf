# Uncomment the following line to turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y

# Enable both USB and BLE
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_BOOT=y
CONFIG_ZMK_BLE=y

# Keyboard IDs
CONFIG_ZMK_KEYBOARD_NAME="DaiRi"

CONFIG_USB_DEVICE_VID=0xFEED
CONFIG_USB_DEVICE_PID=0x6060
CONFIG_USB_DEVICE_MANUFACTURER="DaiRi Band"

CONFIG_BT_DIS_PNP_VID=0xFEED
CONFIG_BT_DIS_PNP_PID=0x6060
CONFIG_BT_DIS_MANUF="Dairi Band"
CONFIG_BT_DIS_MODEL="DaiRi"

# BT Experimental
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y
# BT Fix
# CONFIG_BT_CTLR_PHY_2M=n
# CONFIG_BT_GATT_AUTO_SEC_REQ=y
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Uncomment to enable encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Battery
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300
